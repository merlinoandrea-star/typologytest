<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typology — Scopri il tuo profilo</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #141418;
      --surface2: #1c1c22;
      --border: #2a2a32;
      --accent: #c9a96e;
      --accent2: #8b6f47;
      --text: #e8e4dc;
      --text2: #9a9490;
      --text3: #5a5650;
      --sofia: #c9a96e;
      --user: #4a7c6f;
      --radius: 16px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    /* ── LAYOUT ── */
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 860px; margin: 0 auto; padding: 0 16px; }

    /* ── HEADER ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 300; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; }
    .logo span { font-style: italic; font-weight: 400; }
    .progress-wrap { display: flex; align-items: center; gap: 12px; }
    .progress-label { font-size: 11px; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; }
    .progress-bar { width: 120px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 2px; transition: width 0.6s ease; }

    /* ── AVATAR ── */
    .avatar-row { display: flex; align-items: center; gap: 14px; padding: 20px 0 12px; flex-shrink: 0; }
    .avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--bg);
      flex-shrink: 0; position: relative;
    }
    .avatar::after {
      content: ''; position: absolute; inset: -2px; border-radius: 50%;
      border: 1px solid var(--accent); opacity: 0.4;
    }
    .avatar-info { }
    .avatar-name { font-size: 13px; font-weight: 500; color: var(--text); letter-spacing: 0.04em; }
    .avatar-role { font-size: 11px; color: var(--text3); font-style: italic; }

    /* ── CHAT ── */
    #chat {
      flex: 1; overflow-y: auto; padding: 8px 0 16px;
      display: flex; flex-direction: column; gap: 16px;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .msg { display: flex; gap: 10px; animation: fadeUp 0.35s ease; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .msg.sofia { align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .msg-avatar { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; margin-top: 2px; }
    .msg-avatar.sofia-av { background: linear-gradient(135deg, var(--accent2), var(--accent)); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--bg); }
    .msg-avatar.user-av { background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--text2); }

    .bubble {
      max-width: 78%; padding: 13px 16px; border-radius: var(--radius);
      font-size: 14px; line-height: 1.65; font-weight: 300;
    }
    .msg.sofia .bubble { background: var(--surface); border: 1px solid var(--border); color: var(--text); border-top-left-radius: 4px; }
    .msg.user .bubble { background: var(--user); color: #e8f4f0; border-top-right-radius: 4px; font-style: italic; }

    /* ── SCELTE A/B ── */
    .choices { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .choice-btn {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 11px 16px; border-radius: 10px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300;
      cursor: pointer; text-align: left; transition: all 0.2s ease;
      display: flex; align-items: flex-start; gap: 10px; line-height: 1.5;
    }
    .choice-btn:hover { background: var(--surface); border-color: var(--accent2); color: var(--text); }
    .choice-btn:active { transform: scale(0.99); }
    .choice-label {
      font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 600;
      color: var(--accent); flex-shrink: 0; line-height: 1.4;
    }

    /* ── TYPING ── */
    .typing { display: flex; gap: 5px; align-items: center; padding: 13px 16px; }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent2); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,80%,100%{ transform:scale(0.7); opacity:0.4; } 40%{ transform:scale(1); opacity:1; } }

    /* ── RISULTATO ── */
    #result-panel { display: none; flex-direction: column; gap: 0; animation: fadeUp 0.5s ease; overflow-y: auto; flex: 1; }
    #result-panel.visible { display: flex; }

    .result-header {
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
    }
    .result-tag { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent2); margin-bottom: 10px; }
    .result-sigla {
      font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300;
      color: var(--accent); letter-spacing: 0.08em; line-height: 1.1;
    }
    .result-otroversion {
      display: inline-block; margin-top: 10px;
      padding: 4px 14px; border: 1px solid var(--accent2); border-radius: 20px;
      font-size: 12px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase;
    }

    .result-section { padding: 20px 0; border-bottom: 1px solid var(--border); }
    .result-section:last-child { border-bottom: none; }
    .section-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text3); margin-bottom: 12px; }

    .functions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .function-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px;
    }
    .function-card.dominant { border-color: var(--accent2); }
    .function-role { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
    .function-name { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--text); font-weight: 400; }
    .function-card.dominant .function-name { color: var(--accent); }
    .function-score { font-size: 11px; color: var(--text3); margin-top: 4px; }

    .radar-wrap { display: flex; justify-content: center; padding: 8px 0; }
    svg.radar { overflow: visible; }

    .profile-text { font-size: 14px; line-height: 1.75; font-weight: 300; color: var(--text2); }

    .belonging-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px; display: flex; gap: 16px; align-items: flex-start;
    }
    .belonging-icon { font-size: 28px; flex-shrink: 0; }
    .belonging-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; color: var(--accent); margin-bottom: 6px; }
    .belonging-desc { font-size: 13px; line-height: 1.65; font-weight: 300; color: var(--text2); }

    /* ── INPUT ── */
    #input-area { padding: 12px 0 20px; flex-shrink: 0; border-top: 1px solid var(--border); }
    #input-row { display: flex; gap: 10px; }
    #user-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--text); padding: 12px 16px; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 300;
      outline: none; transition: border-color 0.2s;
    }
    #user-input:focus { border-color: var(--accent2); }
    #user-input::placeholder { color: var(--text3); }
    #send-btn {
      background: var(--accent); border: none; color: var(--bg);
      width: 44px; height: 44px; border-radius: 12px; cursor: pointer;
      font-size: 18px; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.1s; flex-shrink: 0;
    }
    #send-btn:hover { background: var(--text); }
    #send-btn:active { transform: scale(0.96); }
    .hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 8px; letter-spacing: 0.04em; }

    @media (max-width: 600px) {
      .functions-grid { grid-template-columns: 1fr; }
      .result-sigla { font-size: 26px; }
    }
  </style>
</head>
<body>
<div id="app">

  <header>
    <div class="logo">Typo<span>logy</span></div>
    <div class="progress-wrap">
      <span class="progress-label">Progresso</span>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <span class="progress-label" id="progress-text">0 / 72</span>
    </div>
  </header>

  <div class="avatar-row">
    <div class="avatar">S</div>
    <div class="avatar-info">
      <div class="avatar-name">Sofia</div>
      <div class="avatar-role">Guida alla scoperta del tuo profilo</div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- RISULTATO (nascosto finché non completo) -->
  <div id="result-panel"></div>

  <!-- INPUT -->
  <div id="input-area">
    <div id="input-row">
      <input id="user-input" type="text" placeholder="Scrivi o scegli A / B..." autocomplete="off" />
      <button id="send-btn">↑</button>
    </div>
    <div class="hint" id="hint-text">Rispondi scegliendo A o B, oppure scrivi liberamente</div>
  </div>
</div>

<script>
const API = 'https://typologytest.onrender.com';

let questions = [];
let responses = {};
let conversationHistory = [];
let currentQIndex = 0;
let awaitingChoice = false;
let testCompleted = false;

const chat = document.getElementById('chat');
const resultPanel = document.getElementById('result-panel');
const input = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const progressFill = document.getElementById('progress-fill');
const progressText = document.getElementById('progress-text');

// ── UTILITIES ─────────────────────────────────────────────────────────────
function scrollBottom() {
  chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
}

function updateProgress() {
  const pct = (Object.keys(responses).length / 72) * 100;
  progressFill.style.width = pct + '%';
  progressText.textContent = `${Object.keys(responses).length} / 72`;
}

function addMsg(role, text, showChoices = false, qIndex = null) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = `msg-avatar ${role === 'sofia' ? 'sofia-av' : 'user-av'}`;
  av.textContent = role === 'sofia' ? 'S' : '✦';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(av);
  div.appendChild(bubble);
  chat.appendChild(div);

  if (showChoices && qIndex !== null && qIndex < questions.length) {
    const q = questions[qIndex];
    const choicesDiv = document.createElement('div');
    choicesDiv.className = 'choices';

    ['A', 'B'].forEach(letter => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.innerHTML = `<span class="choice-label">${letter}</span><span>${letter === 'A' ? q.testoA : q.testoB}</span>`;
      btn.onclick = () => {
        choicesDiv.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
        choicesDiv.style.opacity = '0.5';
        handleChoice(letter, qIndex);
      };
      choicesDiv.appendChild(btn);
    });

    chat.appendChild(choicesDiv);
  }

  scrollBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg sofia';
  div.id = 'typing-indicator';

  const av = document.createElement('div');
  av.className = 'msg-avatar sofia-av';
  av.textContent = 'S';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  div.appendChild(av);
  div.appendChild(bubble);
  chat.appendChild(div);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ── INIT ──────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch(`${API}/api/questions`);
    const data = await res.json();
    questions = data.questions;
    startConversation();
  } catch(e) {
    addMsg('sofia', 'Errore di connessione. Ricarica la pagina.');
  }
}

async function startConversation() {
  showTyping();
  const res = await fetch(`${API}/api/chat`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      message: 'inizia',
      conversation_history: [],
      responses: {},
      current_question_index: 0
    })
  });
  const data = await res.json();
  removeTyping();

  conversationHistory.push({role: 'user', content: 'inizia'});
  conversationHistory.push({role: 'assistant', content: data.response});

  addMsg('sofia', data.response, true, 0);
  awaitingChoice = true;
}

// ── GESTIONE SCELTA A/B ───────────────────────────────────────────────────
async function handleChoice(choice, qIndex) {
  awaitingChoice = false;
  const q = questions[qIndex];
  const choiceText = choice === 'A' ? q.testoA : q.testoB;

  // Registra risposta
  responses[String(q.id)] = choice;
  updateProgress();

  // Mostra risposta utente
  addMsg('user', `${choice} — ${choiceText}`);

  // Avanza al prossimo
  currentQIndex = qIndex + 1;

  if (currentQIndex >= questions.length) {
    // Test completato
    await showFinalResult();
    return;
  }

  // Prossima domanda
  showTyping();
  try {
    conversationHistory.push({role: 'user', content: choice});

    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: choice,
        conversation_history: conversationHistory.slice(-8), // ultimi 8 messaggi
        responses,
        current_question_index: currentQIndex
      })
    });
    const data = await res.json();
    removeTyping();

    conversationHistory.push({role: 'assistant', content: data.response});
    addMsg('sofia', data.response, true, currentQIndex);
    awaitingChoice = true;

  } catch(e) {
    removeTyping();
    addMsg('sofia', 'Errore. Riprova.');
  }
}

// ── RISULTATO FINALE ──────────────────────────────────────────────────────
async function showFinalResult() {
  showTyping();

  try {
    const res = await fetch(`${API}/api/submit`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ responses })
    });
    const result = await res.json();
    removeTyping();

    // Nascondi chat, mostra risultato
    chat.style.display = 'none';
    document.getElementById('input-area').style.display = 'none';
    document.querySelector('.avatar-row').style.display = 'none';

    resultPanel.classList.add('visible');
    renderResult(result);

  } catch(e) {
    removeTyping();
    addMsg('sofia', 'Errore nel calcolo del profilo. Ricarica la pagina.');
  }
}

function renderResult(r) {
  const fn = { T:'Pensiero', F:'Sentimento', S:'Sensazione', N:'Intuizione', E:'Estroverso', I:'Introverso' };
  const scores = r.scores;

  // Radar SVG
  const radarData = [
    { label: 'Pensiero', value: scores.T, angle: -90 },
    { label: 'Intuizione', value: scores.N, angle: -18 },
    { label: 'Sentimento', value: scores.F, angle: 54 },
    { label: 'Sensazione', value: scores.S, angle: 126 },
    { label: 'Estroverso', value: scores.E, angle: 198 },
  ];

  const rcx = 120, rcy = 120, rrad = 80;
  function radarPt(angle, val) {
    const rad = (angle * Math.PI) / 180;
    const dist = (val / 100) * rrad;
    return { x: rcx + dist * Math.cos(rad), y: rcy + dist * Math.sin(rad) };
  }
  const pts = radarData.map(d => radarPt(d.angle, d.value));
  const polyPath = pts.map((p,i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') + ' Z';

  // Assi background
  const axesHtml = radarData.map(d => {
    const ep = radarPt(d.angle, 100);
    const lp = radarPt(d.angle, 115);
    return `<line x1="${rcx}" y1="${rcy}" x2="${ep.x.toFixed(1)}" y2="${ep.y.toFixed(1)}" stroke="#2a2a32" stroke-width="1"/>
    <text x="${lp.x.toFixed(1)}" y="${lp.y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" font-size="9" fill="#5a5650" font-family="DM Sans">${d.label}</text>`;
  }).join('');

  const radarSVG = `
  <svg class="radar" width="240" height="240" viewBox="0 0 240 240">
    <circle cx="${rcx}" cy="${rcy}" r="${rrad}" fill="none" stroke="#1c1c22" stroke-width="1"/>
    <circle cx="${rcx}" cy="${rcy}" r="${rrad*0.66}" fill="none" stroke="#1c1c22" stroke-width="1"/>
    <circle cx="${rcx}" cy="${rcy}" r="${rrad*0.33}" fill="none" stroke="#1c1c22" stroke-width="1"/>
    ${axesHtml}
    <path d="${polyPath}" fill="#c9a96e" fill-opacity="0.15" stroke="#c9a96e" stroke-width="1.5"/>
    ${pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="3" fill="#c9a96e"/>`).join('')}
  </svg>`;

  // Belonging/Not Belonging descrizione
  const belongingDesc = r.otroversion === 'Belonging'
    ? 'Ti identifichi con gruppi e comunità, condividi valori collettivi e cerchi naturalmente l\'appartenenza. Trova forza e motivazione nel senso di "noi".'
    : 'Mantieni la tua identità distinta dai gruppi. Preferisci relazioni individuali profonde e non hai bisogno di appartenere a una comunità per sentirti completo.';

  resultPanel.innerHTML = `
    <div class="result-header">
      <div class="result-tag">Il tuo profilo tipologico</div>
      <div class="result-sigla">${r.sigla}</div>
      <div style="font-size:13px;color:var(--text2);margin-top:8px;line-height:1.6;font-weight:300;">${r.nome_esteso}</div>
      <div class="result-otroversion">${r.otroversion}</div>
    </div>

    <div class="result-section">
      <div class="section-label">Funzioni psicologiche</div>
      <div class="functions-grid">
        <div class="function-card dominant">
          <div class="function-role">Funzione Primaria</div>
          <div class="function-name">${fn[r.dominant]}</div>
          <div class="function-score">${scores[r.dominant]}%</div>
        </div>
        <div class="function-card">
          <div class="function-role">Funzione Ausiliaria</div>
          <div class="function-name">${fn[r.auxiliary]}</div>
          <div class="function-score">${scores[r.auxiliary]}%</div>
        </div>
        <div class="function-card">
          <div class="function-role">Funzione Mediatrice</div>
          <div class="function-name">${fn[r.tertiary]}</div>
          <div class="function-score">${scores[r.tertiary]}%</div>
        </div>
        <div class="function-card">
          <div class="function-role">Funzione Inferiore</div>
          <div class="function-name">${fn[r.inferior]}</div>
          <div class="function-score">${scores[r.inferior]}%</div>
        </div>
      </div>
    </div>

    <div class="result-section">
      <div class="section-label">Mappa delle funzioni</div>
      <div class="radar-wrap">${radarSVG}</div>
    </div>

    <div class="result-section">
      <div class="section-label">Descrizione del profilo</div>
      <div class="profile-text">${r.profile_description}</div>
    </div>

    <div class="result-section">
      <div class="section-label">Otroversione — Kaminski</div>
      <div class="belonging-card">
        <div class="belonging-icon">${r.otroversion === 'Belonging' ? '🤝' : '✦'}</div>
        <div>
          <div class="belonging-title">${r.otroversion}</div>
          <div class="belonging-desc">${belongingDesc}</div>
        </div>
      </div>
    </div>
  `;
}

// ── INVIO TESTO LIBERO ─────────────────────────────────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if (!text || testCompleted) return;

  // Intercetta A/B
  const upper = text.toUpperCase();
  if (awaitingChoice && (upper === 'A' || upper === 'B')) {
    input.value = '';
    const btns = document.querySelectorAll('.choice-btn:not([disabled])');
    if (btns.length >= 2) {
      const idx = upper === 'A' ? 0 : 1;
      btns[idx].click();
    }
    return;
  }

  input.value = '';
  addMsg('user', text);

  showTyping();
  conversationHistory.push({role: 'user', content: text});

  try {
    const res = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        message: text,
        conversation_history: conversationHistory.slice(-8),
        responses,
        current_question_index: currentQIndex
      })
    });
    const data = await res.json();
    removeTyping();

    conversationHistory.push({role: 'assistant', content: data.response});
    addMsg('sofia', data.response, awaitingChoice, currentQIndex);

  } catch(e) {
    removeTyping();
    addMsg('sofia', 'Errore di connessione. Riprova.');
  }
}

sendBtn.onclick = sendMessage;
input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

init();
</script>
</body>
</html>
