<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TYPOLOGY</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1F2A44;
  --accent:#3E5CFF;
  --bg:#F8F9FB;
  --text:#1F2A44;
  --text-secondary:#4A4F5A;
  --gold:#C8A75D;
  --border:#E2E6EE;
  --white:#FFFFFF;
  --surface:#F0F3F9;
  --shadow:0 2px 16px rgba(31,42,68,0.08);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-weight:400;-webkit-font-smoothing:antialiased}

/* ── LOADING ── */
#loading-screen{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#1F2A44 0%,#2a3a60 60%,#3E5CFF 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2.5rem;z-index:100;transition:opacity 0.7s ease;
}
#loading-screen.fade-out{opacity:0;pointer-events:none}
.loading-logo{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5vw,3rem);
  font-weight:400;letter-spacing:0.25em;
  color:#F8F9FB;
}
.loading-logo span{color:var(--gold);font-size:0.6em;letter-spacing:0.4em;display:block;margin-top:0.3rem;font-family:'Inter',sans-serif;font-weight:300;text-transform:uppercase}
.loading-bar-wrap{width:200px;height:2px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden}
.loading-bar-fill{height:100%;background:var(--accent);animation:loadSlide 3s ease forwards;width:0}
@keyframes loadSlide{to{width:100%}}
.loading-text{font-size:0.72rem;letter-spacing:0.2em;color:rgba(248,249,251,0.5);text-transform:uppercase;font-weight:300}

/* ── APP ── */
#app{display:none;height:100vh;flex-direction:column}
#app.visible{display:flex}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2.5rem;height:64px;
  background:var(--primary);
  flex-shrink:0;
}
.logo{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;font-weight:500;
  letter-spacing:0.15em;color:#F8F9FB;
}
.logo-dot{color:var(--gold);margin-left:2px}
.progress-wrap{display:flex;align-items:center;gap:1.2rem}
.progress-count{font-size:0.72rem;letter-spacing:0.12em;color:rgba(248,249,251,0.5);font-weight:300;text-transform:uppercase}
.progress-track{width:120px;height:2px;background:rgba(255,255,255,0.12);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.5s ease;width:0%}

/* ── MAIN ── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── CHAT AREA ── */
#chat-view{display:flex;flex-direction:column;flex:1;overflow:hidden}

#messages{
  flex:1;overflow-y:auto;
  padding:2.5rem;
  display:flex;flex-direction:column;gap:1.5rem;
  scroll-behavior:smooth;
}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.msg{display:flex;gap:1rem;animation:msgIn 0.35s ease both}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}

.avatar{
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:2px;font-size:0.85rem;font-weight:500;
}
.avatar.sofia{background:var(--primary);color:var(--gold)}
.avatar.user-av{background:var(--accent);color:#fff}

.bubble{
  max-width:65%;padding:1rem 1.25rem;
  line-height:1.7;font-size:0.92rem;
  border-radius:12px;
}
.msg.sofia .bubble{
  background:var(--white);
  border:1px solid var(--border);
  color:var(--text);
  box-shadow:var(--shadow);
}
.msg.user .bubble{
  background:var(--primary);
  color:#F8F9FB;
  border-radius:12px 12px 4px 12px;
}

/* ── TYPING ── */
.typing{display:flex;align-items:center;gap:5px;padding:4px 0}
.dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,60%,100%{opacity:0.25;transform:scale(0.8)}30%{opacity:1;transform:scale(1)}}

/* ── INPUT AREA ── */
#input-area{
  padding:1.5rem 2.5rem;
  border-top:1px solid var(--border);
  background:var(--white);
  flex-shrink:0;
}

#choice-buttons{display:flex;gap:1rem;margin-bottom:1rem}
.choice-btn{
  flex:1;padding:0.85rem 1rem;
  border:1.5px solid var(--border);
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;font-size:0.82rem;
  font-weight:500;letter-spacing:0.08em;
  cursor:pointer;border-radius:8px;
  transition:all 0.2s ease;
  text-transform:uppercase;
}
.choice-btn:hover{background:var(--primary);color:#F8F9FB;border-color:var(--primary);transform:translateY(-1px);box-shadow:0 4px 12px rgba(31,42,68,0.15)}
.choice-btn.selected{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(62,92,255,0.25)}

.input-row{display:flex;gap:0.75rem}
#user-input{
  flex:1;padding:0.85rem 1.1rem;
  border:1.5px solid var(--border);
  background:var(--bg);color:var(--text);
  font-family:'Inter',sans-serif;font-size:0.9rem;font-weight:400;
  border-radius:8px;outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
#user-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(62,92,255,0.1)}
#user-input::placeholder{color:#9BA3B2}

#send-btn{
  width:46px;height:46px;
  background:var(--accent);border:none;
  border-radius:8px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;flex-shrink:0;
  box-shadow:0 2px 8px rgba(62,92,255,0.3);
}
#send-btn:hover{background:#2d4ae0;transform:translateY(-1px);box-shadow:0 4px 12px rgba(62,92,255,0.4)}
#send-btn svg{width:18px;height:18px;fill:#fff}
#send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.hint{margin-top:0.6rem;font-size:0.7rem;letter-spacing:0.1em;color:#9BA3B2;text-align:center;text-transform:uppercase}

/* ── RESULT ── */
#result-panel{display:none;flex:1;overflow-y:auto;background:var(--bg);animation:msgIn 0.5s ease}
#result-panel.visible{display:block}

.result-hero{
  background:linear-gradient(135deg,#1F2A44 0%,#2a3a60 100%);
  padding:4rem 2.5rem 3rem;
  text-align:center;
}
.result-eyebrow{
  font-size:0.7rem;letter-spacing:0.3em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1.25rem;font-weight:400;
}
.result-sigla{
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,5vw,3rem);
  font-weight:400;color:#F8F9FB;
  letter-spacing:0.1em;margin-bottom:1rem;
}
.result-subtitle{
  font-size:0.85rem;color:rgba(248,249,251,0.6);
  letter-spacing:0.05em;line-height:1.6;
  max-width:500px;margin:0 auto 1.5rem;
}
.otroversion-badge{
  display:inline-flex;align-items:center;gap:0.5rem;
  padding:0.45rem 1.1rem;
  border:1px solid var(--gold);border-radius:20px;
  font-size:0.72rem;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--gold);
}

.result-body{max-width:680px;margin:0 auto;padding:3rem 2.5rem}

.result-card{
  background:var(--white);border-radius:12px;
  padding:2rem;margin-bottom:1.5rem;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}
.card-label{
  font-size:0.68rem;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--accent);font-weight:500;margin-bottom:1rem;
}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:1.1rem;font-weight:500;
  color:var(--primary);margin-bottom:0.75rem;line-height:1.4;
}
.card-text{font-size:0.92rem;line-height:1.75;color:var(--text-secondary)}

.scores-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.score-item{}
.score-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:0.35rem}
.score-name{font-size:0.78rem;font-weight:500;color:var(--text)}
.score-val{font-size:0.72rem;color:var(--text-secondary);font-weight:400}
.score-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.score-bar{height:100%;background:linear-gradient(90deg,var(--accent),#6b87ff);border-radius:2px;transition:width 1s ease 0.3s;width:0%}

.restart-btn{
  display:block;width:100%;
  padding:1rem;margin-top:2rem;
  border:1.5px solid var(--primary);
  background:transparent;color:var(--primary);
  font-family:'Inter',sans-serif;font-size:0.8rem;
  font-weight:500;letter-spacing:0.15em;text-transform:uppercase;
  cursor:pointer;border-radius:8px;
  transition:all 0.2s;
}
.restart-btn:hover{background:var(--primary);color:#F8F9FB}

/* ── TOAST ── */
#error-toast{
  display:none;position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);
  background:#C0392B;color:#fff;
  padding:0.75rem 1.5rem;border-radius:8px;
  font-size:0.82rem;z-index:200;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,0.2);
}

@media(max-width:640px){
  header{padding:0 1.25rem}
  #messages,#input-area{padding:1.25rem}
  .bubble{max-width:85%}
  #choice-buttons{flex-direction:column}
  .scores-grid{grid-template-columns:1fr}
  .result-hero{padding:3rem 1.5rem 2rem}
  .result-body{padding:2rem 1.25rem}
}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">
    Typology
    <span>Scopri il tuo profilo</span>
  </div>
  <div class="loading-bar-wrap"><div class="loading-bar-fill"></div></div>
  <div class="loading-text" id="loading-text">Connessione in corso…</div>
</div>

<div id="app">
  <header>
    <div class="logo">Typology<span class="logo-dot">·</span></div>
    <div class="progress-wrap">
      <span class="progress-count" id="progress-label">0 / 72</span>
      <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
  </header>

  <main>
    <div id="chat-view">
      <div id="messages"></div>
      <div id="input-area">
        <div id="choice-buttons" style="display:none;">
          <button class="choice-btn" id="btn-a" onclick="sendChoice('A')">A</button>
          <button class="choice-btn" id="btn-b" onclick="sendChoice('B')">B</button>
        </div>
        <div class="input-row">
          <input id="user-input" type="text" placeholder="Scrivi A o B, oppure un messaggio…" autocomplete="off"/>
          <button id="send-btn" onclick="sendMessage()">
            <svg viewBox="0 0 24 24"><path d="M2 12L22 2 15 22 11 13z"/></svg>
          </button>
        </div>
        <div class="hint">Scegli A o B · oppure scrivi e premi Invio</div>
      </div>
    </div>

    <div id="result-panel">
      <div class="result-hero">
        <div class="result-eyebrow">Il tuo profilo tipologico</div>
        <div class="result-sigla" id="res-sigla">—</div>
        <div class="result-subtitle" id="res-subtitle"></div>
        <div class="otroversion-badge" id="res-otroversion">—</div>
      </div>
      <div class="result-body">
        <div class="result-card">
          <div class="card-label">Descrizione del profilo</div>
          <div class="card-text" id="res-desc"></div>
        </div>
        <div class="result-card">
          <div class="card-label">Punteggi per dimensione</div>
          <div class="scores-grid" id="res-scores"></div>
        </div>
        <button class="restart-btn" onclick="location.reload()">Ricomincia il test</button>
      </div>
    </div>
  </main>
</div>

<div id="error-toast"></div>

<script>
const API = 'https://typologytest.onrender.com';
let conversationHistory = [], responses = {}, currentQuestionIndex = 0, isWaiting = false;

function showError(msg){const t=document.getElementById('error-toast');t.textContent=msg;t.style.display='block';setTimeout(()=>t.style.display='none',4000)}
function updateProgress(n){document.getElementById('progress-fill').style.width=Math.round(n/72*100)+'%';document.getElementById('progress-label').textContent=n+' / 72'}
function scrollDown(){const m=document.getElementById('messages');setTimeout(()=>m.scrollTop=m.scrollHeight,50)}

function addMessage(role,text){
  const m=document.getElementById('messages'),div=document.createElement('div');
  div.className='msg '+(role==='assistant'?'sofia':'user');
  const initial=role==='assistant'?'S':'T';
  div.innerHTML=`<div class="avatar ${role==='assistant'?'sofia':'user-av'}">${initial}</div><div class="bubble">${text.replace(/\n/g,'<br>')}</div>`;
  m.appendChild(div);scrollDown();
}
function showTyping(){const m=document.getElementById('messages'),div=document.createElement('div');div.className='msg sofia';div.id='typing-ind';div.innerHTML=`<div class="avatar sofia">S</div><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;m.appendChild(div);scrollDown()}
function removeTyping(){const t=document.getElementById('typing-ind');if(t)t.remove()}

async function callAPI(endpoint,body,retries=4){
  for(let i=0;i<retries;i++){
    try{
      const res=await fetch(API+endpoint,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body),signal:AbortSignal.timeout(65000)});
      if(!res.ok)throw new Error('HTTP '+res.status);
      return await res.json();
    }catch(e){
      if(i<retries-1){showError('Connessione lenta… tentativo '+(i+2)+'/'+retries);await new Promise(r=>setTimeout(r,4000));}
      else throw e;
    }
  }
}

async function sendMessage(){
  const input=document.getElementById('user-input'),text=input.value.trim();
  if(!text||isWaiting)return;
  const u=text.toUpperCase();
  if(u==='A'||u==='B'){sendChoice(u);return;}
  input.value='';addMessage('user',text);await fetchResponse(text,null);
}

async function sendChoice(choice){
  if(isWaiting)return;
  document.getElementById('btn-a').classList.toggle('selected',choice==='A');
  document.getElementById('btn-b').classList.toggle('selected',choice==='B');
  responses[String(currentQuestionIndex+1)]=choice;
  addMessage('user',choice==='A'?'Opzione A':'Opzione B');
  await fetchResponse(choice,choice);
}

async function fetchResponse(userText,choice){
  isWaiting=true;
  document.getElementById('send-btn').disabled=true;
  document.getElementById('choice-buttons').style.display='none';
  showTyping();
  const history=[...conversationHistory];
  try{
    const data=await callAPI('/api/chat',{message:userText,conversation_history:conversationHistory,responses:responses,current_question_index:currentQuestionIndex});
    removeTyping();
    conversationHistory=[...history,{role:'user',content:userText},{role:'assistant',content:data.response}];
    addMessage('assistant',data.response);
    if(data.completed){setTimeout(()=>loadAndShowResult(),1200);}
    else{
      currentQuestionIndex=data.question_index+1;
      if(choice)updateProgress(currentQuestionIndex);
      document.getElementById('btn-a').classList.remove('selected');
      document.getElementById('btn-b').classList.remove('selected');
      document.getElementById('choice-buttons').style.display='flex';
    }
  }catch(e){
    removeTyping();addMessage('assistant','Si è verificato un problema di connessione. Riprova.');
    document.getElementById('choice-buttons').style.display='flex';
  }
  isWaiting=false;document.getElementById('send-btn').disabled=false;
}

async function loadAndShowResult(){
  updateProgress(72);
  document.getElementById('chat-view').style.display='none';
  document.getElementById('result-panel').classList.add('visible');
  try{const data=await callAPI('/api/submit',{responses});renderResult(data);}
  catch(e){document.getElementById('res-desc').textContent='Errore nel calcolo del profilo. Ricarica la pagina.';}
}

function renderResult(d){
  const s=d.scores;
  document.getElementById('res-sigla').textContent=d.sigla;
  document.getElementById('res-subtitle').textContent=d.nome_esteso;
  document.getElementById('res-otroversion').textContent='◆ '+d.otroversion;
  document.getElementById('res-desc').textContent=d.profile_description;
  const grid=document.getElementById('res-scores');
  grid.innerHTML=[['Pensiero',s.T],['Sentimento',s.F],['Sensazione',s.S],['Intuizione',s.N],['Estroversione',s.E],['Introversione',s.I]]
    .map(([l,v])=>`<div class="score-item"><div class="score-row"><span class="score-name">${l}</span><span class="score-val">${v}%</span></div><div class="score-track"><div class="score-bar" data-val="${v}"></div></div></div>`).join('');
  setTimeout(()=>document.querySelectorAll('.score-bar').forEach(b=>b.style.width=b.dataset.val+'%'),300);
}

async function wakeAndStart(){
  const loadText=document.getElementById('loading-text');
  let dots=0;
  const spin=setInterval(()=>{dots=(dots+1)%4;loadText.textContent='Connessione in corso'+'.'.repeat(dots);},600);
  for(let i=0;i<8;i++){
    try{const r=await fetch(API+'/',{signal:AbortSignal.timeout(12000)});if(r.ok)break;}catch(e){}
    await new Promise(r=>setTimeout(r,5000));
  }
  clearInterval(spin);loadText.textContent='Pronto!';
  await new Promise(r=>setTimeout(r,400));
  document.getElementById('loading-screen').classList.add('fade-out');
  setTimeout(()=>{document.getElementById('loading-screen').style.display='none';document.getElementById('app').classList.add('visible');},800);

  showTyping();
  try{
    const data=await callAPI('/api/chat',{message:'Inizia il test',conversation_history:[],responses:{},current_question_index:0});
    removeTyping();
    conversationHistory=[{role:'user',content:'Inizia il test'},{role:'assistant',content:data.response}];
    addMessage('assistant',data.response);
    document.getElementById('choice-buttons').style.display='flex';
  }catch(e){
    removeTyping();addMessage('assistant','Ciao! Sono Sofia. Problemi di connessione — ricarica la pagina per iniziare.');
  }
}

document.getElementById('user-input').addEventListener('keydown',e=>{if(e.key==='Enter')sendMessage();});
wakeAndStart();
</script>

<!-- ─── DEV BUTTON — RIMUOVERE PRIMA DEL LANCIO ─── -->
<div id="dev-banner" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
  <span style="font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:#E53E3E;padding:3px 8px;border-radius:4px;">🛠 DEV ONLY</span>
  <button onclick="simulaRisultato()" style="display:flex;align-items:center;gap:10px;background:#1F2A44;color:#fff;border:2px solid #C8A75D;border-radius:12px;padding:14px 22px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 8px 32px rgba(31,42,68,.35);">
    <span>⚡</span><span>Simula Profilo</span>
  </button>
</div>

<script>
function simulaRisultato() {
  const fakeResult = {
    sigla: "E-N-T-S",
    nome_esteso: "L'Architetto Strategico",
    otroversion: "Not Belonging",
    profile_description: "Sei una persona con una visione naturalmente strategica: vedi connessioni dove gli altri vedono caos, e trasformi idee astratte in piani concreti. La tua Intuizione dominante ti spinge costantemente verso nuove possibilità, mentre il Pensiero ausiliario garantisce rigore e coerenza nelle tue decisioni.\n\nIn ambito professionale sei al meglio quando puoi progettare sistemi, guidare trasformazioni o risolvere problemi complessi che richiedono sia creatività che disciplina.",
    scores: { N: 78, T: 71, E: 68, S: 44, F: 29, I: 32 }
  };
  // Mostra il pannello risultati
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').classList.add('visible');
  document.getElementById('chat-view').style.display = 'none';
  document.getElementById('result-panel').classList.add('visible');
  updateProgress(72);
  renderResult(fakeResult);
}
</script>
<!-- ─── FINE DEV BUTTON ─── -->

</body>
</html>
